name: Deploy React Site

on:
  push:
    branches: ["main"] # Esegue il deploy ogni volta che fai push su main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # Assicurati che sia 'dist' (Vite) o 'build' (CRA)
          path: './dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4